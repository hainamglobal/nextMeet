exclude: "node_modules|.git"
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: "meet.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.3
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]

      - id: ruff
        args: ["--fix"]
        name: "Run ruff linter"

      - id: ruff-format
        name: "Run ruff formatter"

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.12
    hooks:
      - id: biome-check
        name: Biome Check (Frontend)
        entry: bash -lc 'cd frontend && node_modules/.bin/biome check --write --config-path biome.json "${@/#frontend\//}"' --
        language: system
        files: "frontend/.*\\.(js|ts|vue|json|jsx|tsx)$"
        # Ignore any files that might contain jinja / bundles
        exclude: |
          (?x)^(
              frontend/components.d.ts|
              meet/public/dist/.*|
              cypress/.*|
              .*node_modules.*|
              .*boilerplate.*|
              meet/templates/includes/.*|
              meet/public/js/lib/.*
          )$

      - id: biome-check
        name: Biome Check (SFU Server)
        entry: bash -lc 'cd sfu-server && node_modules/.bin/biome check --write --config-path biome.json "${@/#sfu-server\//}"' --
        language: system
        files: "sfu-server/.*\\.(js|ts|json)$"
        exclude: |
          (?x)^(
              .*node_modules.*|
              sfu-server/dist/.*
          )$

  - repo: local
    hooks:
      - id: knip-e2e
        name: Knip (E2E)
        entry: yarn knip:e2e
        language: system
        pass_filenames: false
        files: |
          (?x)^(
              e2e/.*|
              knip\.json|
              package\.json|
              yarn\.lock
          )$

      - id: knip-frontend
        name: Knip (Frontend)
        entry: yarn knip:frontend
        language: system
        pass_filenames: false
        files: |
          (?x)^(
              frontend/.*|
              knip\.json|
              package\.json|
              yarn\.lock
          )$

      - id: typecheck-frontend
        name: TypeCheck (Frontend)
        entry: bash -lc 'cd frontend && yarn typecheck 2>&1 | grep -v node_modules'
        language: system
        pass_filenames: false
        files: "frontend/.*\\.(ts|vue)$"

      - id: knip-sfu-server
        name: Knip (SFU Server)
        entry: yarn knip:sfu-server
        language: system
        pass_filenames: false
        files: |
          (?x)^(
              sfu-server/.*|
              knip\.json|
              package\.json|
              yarn\.lock
          )$

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
